name: Deploy Banking App to Amazon EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2 Ubuntu Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy application files to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/banking-app

      - name: Install dependencies and restart application
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/banking-app

            npm install --production

            pm2 delete banking-app || true
            pm2 start server.js --name banking-app
            pm2 save

            sudo systemctl restart nginx
          EOF