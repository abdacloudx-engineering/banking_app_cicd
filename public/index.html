<!DOCTYPE html>
<html>
<head>
  <title>Simple Banking App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      margin-top: 80px;
    }

    .card {
      background: white;
      padding: 30px;
      width: 350px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1f2937;
    }

    .balance {
      font-size: 32px;
      font-weight: bold;
      color: green;
      margin: 20px 0;
    }

    input {
      padding: 10px;
      width: 90%;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      margin: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .deposit {
      background: #16a34a;
      color: white;
    }

    .withdraw {
      background: #dc2626;
      color: white;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }

    .history {
      margin-top: 20px;
      text-align: left;
    }

    .history h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    .history ul {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 150px;
      overflow-y: auto;
    }

    .history li {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .history .tx-deposit {
      color: #16a34a;
    }

    .history .tx-withdraw {
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Simple Banking App</h1>
    <div class="balance">$<span id="balance">500</span></div>

    <input type="number" id="amount" placeholder="Enter amount" />

    <br />

    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>

    <p id="message"></p>

    <div class="history">
      <h3>Recent Transactions</h3>
      <ul id="transactions"></ul>
    </div>
  </div>

  <script>
    async function loadBalance() {
      const res = await fetch("/api/balance");
      const data = await res.json();
      document.getElementById("balance").innerText = data.balance;
    }

    async function loadTransactions() {
      const res = await fetch("/api/transactions");
      const data = await res.json();

      const list = document.getElementById("transactions");
      list.innerHTML = "";

      data.transactions.forEach((tx) => {
        const li = document.createElement("li");
        const sign = tx.type === "deposit" ? "+" : "-";
        const time = new Date(tx.timestamp).toLocaleTimeString();

        li.innerHTML = `<span class="tx-${tx.type}">${sign}$${tx.amount}</span> — ${tx.type} at ${time} (balance: $${tx.balance})`;
        list.appendChild(li);
      });
    }

    async function deposit() {
      const amount = document.getElementById("amount").value;

      const res = await fetch("/api/deposit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount })
      });

      const data = await res.json();
      document.getElementById("message").innerText = data.message;

      if (data.balance !== undefined) {
        document.getElementById("balance").innerText = data.balance;
        loadTransactions();
      }
    }

    async function withdraw() {
      const amount = document.getElementById("amount").value;

      const res = await fetch("/api/withdraw", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount })
      });

      const data = await res.json();
      document.getElementById("message").innerText = data.message;

      if (data.balance !== undefined) {
        document.getElementById("balance").innerText = data.balance;
        loadTransactions();
      }
    }

    loadBalance();
    loadTransactions();
  </script>
</body>
</html>
