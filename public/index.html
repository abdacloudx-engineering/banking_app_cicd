<!DOCTYPE html>
<html>
<head>
  <title>ABDA Simple Banking App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 420px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #1f2937;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 20px;
    }

    .balance {
      font-size: 32px;
      margin: 20px 0;
      color: #047857;
      font-weight: bold;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }

    button {
      width: 44%;
      padding: 12px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      color: white;
    }

    .deposit {
      background: #2563eb;
    }

    .withdraw {
      background: #dc2626;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
      color: #374151;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ABDA Banking App</h1>
    <p class="subtitle">Simple Deposit and Withdrawal Demo</p>

    <p>Current Balance</p>
    <div class="balance" id="balance">$0</div>

    <input type="number" id="amount" placeholder="Enter amount">

    <br>

    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>

    <div class="message" id="message"></div>
  </div>

  <script>
    async function getBalance() {
      const response = await fetch("/api/balance");
      const data = await response.json();
      document.getElementById("balance").innerText = "$" + data.balance;
    }

    async function deposit() {
      const amount = document.getElementById("amount").value;

      const response = await fetch("/api/deposit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: amount })
      });

      const data = await response.json();
      document.getElementById("message").innerText = data.message;
      getBalance();
    }

    async function withdraw() {
      const amount = document.getElementById("amount").value;

      const response = await fetch("/api/withdraw", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: amount })
      });

      const data = await response.json();
      document.getElementById("message").innerText = data.message;
      getBalance();
    }

    getBalance();
  </script>
</body>
</html>
